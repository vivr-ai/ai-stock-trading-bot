; ============================================================================
;  ai-stock-trading-bot configuration — OPTIONAL local-dev file.
;
;  This file is never required. Environment variables always take precedence
;  over anything here, and the bot runs fine with NO file at all (e.g. on
;  Railway — see .env.example / DEPLOYMENT.md). Copy this to config.ini only
;  if you'd rather not export env vars in every local terminal session.
;
;  DEFAULTS BELOW = "simplified mode": the ONLY value you must provide is the
;  two Alpaca paper keys. Universe = static, news = Alpaca's free feed, and
;  sentiment = a built-in offline word-list.
; ============================================================================

[alpaca]
api_key = YOUR_ALPACA_PAPER_KEY
secret_key = YOUR_ALPACA_PAPER_SECRET
; Leave true. Paper-trading only; the bot refuses to start against a live account.
paper = true

[universe]
; mention = count ticker mentions in Finnhub's general news feed (needs Finnhub key)
; static  = use the bundled large-cap list (no key, default for simplified mode)
provider = static
top_n = 50
min_symbols = 25

[news]
; alpaca  = free news via your Alpaca keys (no extra key, default)
; finnhub = needs finnhub_key   |   newsapi = needs newsapi_key
provider = alpaca
newsapi_key = YOUR_NEWSAPI_KEY
finnhub_key = YOUR_FINNHUB_KEY
lookback_hours = 12
max_articles_per_symbol = 15

[sentiment]
; lexicon = offline word-list, no key, no extra pip package (default)
; claude  = needs claude_api_key   |   openai = needs openai_api_key
provider = lexicon
claude_api_key = YOUR_ANTHROPIC_KEY
claude_model = claude-haiku-4-5-20251001
openai_api_key = YOUR_OPENAI_KEY
openai_model = gpt-4o-mini
; Only used by the claude/openai providers. 0.0 = deterministic scores.
temperature = 0.0

[strategy]
; --- Buy ---
buy_threshold = 8.0
min_headlines = 5
; Don't chase: skip a buy if the stock has ALREADY risen this much since
; YESTERDAY'S CLOSE (this catches overnight news gaps, not just intraday moves).
; By the time it has popped, the good news is largely priced in.
max_intraday_runup_pct = 8.0
; Confirmation filters: require price above its N-day SMA, and today's volume
; at least min_volume_ratio x the N-day average volume. Missing data fails
; the gate closed (skips the buy) rather than assuming it's fine.
require_price_above_sma = true
sma_period = 20
min_volume_ratio = 1.5
volume_lookback_days = 20
; Market filters: pause ALL new buys if the proxy (SPY) is down more than X%
; today, OR if it's below its own market_regime_ma_period-day SMA (a downtrend,
; not just a bad day). Set drop_pct = 0 or regime_filter_enabled = false to disable.
market_filter_symbol = SPY
market_filter_max_drop_pct = 2.0
market_regime_filter_enabled = true
market_regime_ma_period = 50
; --- Sell (sentiment leg) ---
sell_threshold = -5.0
; Require at least this many headlines before dumping on sentiment, so a single
; stale or misread headline can't flush a position (the price bracket still
; protects it either way).
sell_min_headlines = 3

[risk]
; DRY RUN: log orders the bot *would* place but submit nothing. Start here.
dry_run = true
max_position_pct = 5.0
max_open_positions = 10
max_total_exposure_pct = 50.0
; Spread entries over time instead of dumping ~50% of capital in one 30-min
; window: at most this many NEW positions opened per cycle.
max_new_positions_per_cycle = 3
; Don't pile into one correlated group: at most this many open positions per
; sector (e.g. chips). 0 disables. Names outside the built-in sector map are
; treated as 'unknown' and exempt.
max_positions_per_sector = 3
; After a name exits (stop, target, or sell), wait this long before buying it
; again. Stops in/out churn and wash-trade-like behaviour.
reentry_cooldown_hours = 24
; Price exits attached to every entry as a GTC bracket (survive overnight):
stop_loss_pct = 10.0
take_profit_pct = 20.0
; Optional hard dollar cap per order (0 = disabled).
max_order_notional = 0
; Daily-loss kill switch (% below start-of-day equity). Now ON by default.
daily_loss_limit_pct = 4.0

[schedule]
run_minutes = 0, 30
market_timezone = America/New_York

[logging]
trade_log_path = logs/trades.csv
closed_trades_path = logs/closed_trades.csv
daily_summary_path = logs/daily_summary.log
report_dir = logs/reports
run_log_path = logs/bot.log
; Small JSON file the bot uses to remember exits/cooldowns/open lots between runs.
state_path = logs/state.json
log_level = INFO
; text = human-readable | json = structured (recommended when shipping logs
; to an aggregator, e.g. on Railway)
log_format = text

[retry]
; Applied to every external API call (Alpaca, Finnhub, NewsAPI, Claude, OpenAI).
max_attempts = 4
base_delay_seconds = 1.0
